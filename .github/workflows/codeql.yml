name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Cancel any in-progress run for the same ref to avoid duplicate analysis
    # when a push to main simultaneously triggers both push and pull_request events.
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            yasm gcc g++ \
            liblz4-dev libzstd-dev libsnappy-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.97
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml


      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
