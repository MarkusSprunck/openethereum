name: Docker (Ubuntu, Rust 1.97, latest)

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ihkmunich/openethereum

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            yasm gcc g++ \
            liblz4-dev libzstd-dev libsnappy-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.97
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Build and test directly on the runner — one single build for both
      # CodeQL analysis and the Docker image (via Dockerfile.ci).
      # CXXFLAGS: parity-rocksdb-sys 0.5.6 bundles a RocksDB version that
      # omits `#include <cstdint>` in compaction_iteration_stats.h; GCC 13
      # (Ubuntu 24.04) no longer provides uint64_t transitively, so we
      # inject the missing include for every C++ translation unit.
      - name: Build and test
        env:
          CXXFLAGS: "-include cstdint"
        run: |
          cargo test --all
          cargo build --release --features final
          strip target/release/openethereum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      # Dockerfile.ci copies the pre-built binary from target/release/ instead
      # of rebuilding from source, keeping the Docker layer lean and fast.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          sbom: true
          push: true
          tags: "ihkmunich/openethereum:latest-rust-1.97"
          file: ./.github/docker/ubuntu-rust-1.97/Dockerfile.ci
