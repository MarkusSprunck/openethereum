name: Docker (Ubuntu, Rust 1.97, latest)

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ihkmunich/openethereum
  CXXFLAGS: "-include cstdint"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            yasm gcc g++ \
            liblz4-dev libzstd-dev libsnappy-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.97
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Test Execution
        run: |
          cargo test --all

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Release Build
        run: |
          cargo build --release --features final
          strip target/release/openethereum
          cp target/release/openethereum openethereum

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          sbom: true
          push: true
          tags: "ihkmunich/openethereum:latest-rust-1.97"
          file: ./.github/docker/ubuntu-rust-1.97/Dockerfile.ci
