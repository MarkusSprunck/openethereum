name: Docker (Ubuntu, Rust 1.97, latest)

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ihkmunich/openethereum
  CXXFLAGS: "-include cstdint"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            yasm gcc g++ \
            liblz4-dev libzstd-dev libsnappy-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.97
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # CodeQL Init must come BEFORE any cargo build so autobuild can trace
      # the rustc invocations. Test Execution is placed AFTER CodeQL Analyze
      # and reuses the debug artifacts produced by autobuild (incremental → fast).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          # autobuild replaces build-mode: none; CodeQL intercepts rustc calls
          # which resolves types and macro expansions, pushing the
          # "Percentage of calls with call target" metric above the 50% threshold.
          build-mode: autobuild
          config-file: ./.github/codeql/codeql-config.yml

      # Explicit autobuild step: recommended pattern for build-mode: autobuild.
      # Runs `cargo build` under CodeQL's compiler-tracing wrapper so all rustc
      # invocations are captured before the Analyze step processes the database.
      - name: Build for CodeQL
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # Runs after CodeQL so debug artifacts from autobuild are reused (fast).
      - name: Test Execution
        run: |
          cargo test --all

      - name: Release Build
        run: |
          cargo build --release --features final
          strip target/release/openethereum
          cp target/release/openethereum openethereum

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          sbom: true
          push: true
          tags: "ihkmunich/openethereum:latest-rust-1.97"
          file: ./.github/docker/ubuntu-rust-1.97/Dockerfile.ci
